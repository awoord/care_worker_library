<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>読解単語リスト（A4 PDF版）</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="test.css">
</head>

<body>
    <main class="page">
        <header class="list-header">
            <h1 class="table-caption">単語</h1>
        </header>

        <div class="word-list-container">
            <article class="word-card">
                <div class="word-main-row">
                    <div class="col-check">
                        <input type="checkbox" class="word-check">
                    </div>
                    <div class="col-no">1</div>
                    <div class="col-word">
                        <ruby>選<rt>えら</rt></ruby>ぶ
                    </div>
                    <div class="col-freq">
                        <span class="table-freq">★★★</span>
                    </div>
                    <div class="col-meaning">いくつかの中から合うものを決める、選択する</div>
                    <div class="col-en">
                        <span class="pos-v">[動]</span> choose / select
                    </div>
                </div>
                <div class="word-example-row">
                    <div class="example-block">
                        近所のスーパーで食材を自分で<span class="card-keyword">選び</span>、購入したいと思っている。
                        <span class="card-source">[30-30]</span>
                    </div>
                </div>
            </article>

            <article class="word-card">
                <div class="word-main-row">
                    <div class="col-check"><input type="checkbox" class="word-check"></div>
                    <div class="col-no">2</div>
                    <div class="col-word"><ruby>適切<rt>てきせつ</rt></ruby></div>
                    <div class="col-freq"><span class="table-freq">★★★</span></div>
                    <div class="col-meaning">状況に合っている、ふさわしい</div>
                    <div class="col-en"><span class="pos-adj">[形]</span> appropriate / suitable</div>
                </div>
                <div class="word-example-row">
                    <div class="example-block">
                        対応として、最も<span class="card-keyword">適切</span>なものを1つ選びなさい。
                        <span class="card-source">[30-30]</span>
                    </div>
                </div>
            </article>

        </div>
    </main>
</body>

</html>
